<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account | AIU Global Opportunities Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="account">
    <div class="page-backdrop"></div>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html"><img src="aiu-logo.png" alt="AIU logo" class="brand-logo" /><span class="brand-copy"><strong>AIU Global Opportunities Hub</strong><small>International pathways, research calls, and student growth</small></span></a>
        <nav class="nav">
          <a href="index.html" data-nav="home">Home</a><a href="about.html" data-nav="about">About</a><a href="how-it-works.html" data-nav="how">How It Works</a><a href="opportunities.html" data-nav="opportunities">Opportunities</a><a href="internships.html" data-nav="internships">Internships</a><a href="exchange.html" data-nav="exchange">Exchange</a><a href="research.html" data-nav="research">Research</a><a href="dashboards.html" data-nav="dashboards">Dashboards</a>
        </nav>
        <a class="solid-button" href="dashboards.html">View Dashboards</a>
      </div>
    </header>

    <main class="site-shell">
      <section class="hero page-hero">
        <div class="hero-copy">
          <div class="breadcrumbs"><a href="index.html">Home</a> / Account</div>
          <h1>Login or create your role account</h1>
        </div>
      </section>

      <section class="section-block">
        <article class="auth-card student-panel">
          <div class="auth-mode-switch">
            <button type="button" class="auth-switch active" data-auth="login">Login</button>
            <button type="button" class="auth-switch" data-auth="register">Register</button>
          </div>

          <form id="authForm" class="auth-form">
            <label>
              Full Name
              <input id="fullName" type="text" placeholder="Optional for login" />
            </label>
            <label>
              Email
              <input id="email" type="email" placeholder="name@aiu.edu.eg" required />
            </label>
            <label>
              Role
              <select id="role" required>
                <option value="student">Student</option>
                <option value="researcher">Researcher</option>
                <option value="admin">Professor / Admin</option>
              </select>
            </label>

            <label id="studentLevelRow" class="hidden">
              Student Level
              <select id="studentLevel">
                <option value="">Select level</option>
                <option value="foundation">Foundation</option>
                <option value="year-1">Year 1</option>
                <option value="year-2">Year 2</option>
                <option value="year-3">Year 3</option>
                <option value="year-4">Year 4</option>
                <option value="year-5">Year 5</option>
                <option value="graduate">Graduate</option>
              </select>
            </label>

            <label id="studentFieldRow" class="hidden">
              Student Field
              <select id="studentField">
                <option value="">Select field</option>
                <option value="engineering">Engineering</option>
                <option value="computer-science">Computer Science</option>
                <option value="business">Business</option>
                <option value="arts-communication">Arts and Communication</option>
                <option value="public-health">Public Health</option>
                <option value="pharmacy">Pharmacy</option>
                <option value="architecture-design">Architecture and Design</option>
                <option value="general-research">General Research</option>
              </select>
            </label>

            <button id="authSubmit" type="submit" class="solid-button">Login to Dashboard</button>
          </form>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
